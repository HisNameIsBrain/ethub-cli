<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ETHUB CLI Advanced Dashboard</title>
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --accent: #58a6ff;
            --text: #c9d1d9;
            --muted: #8b949e;
            --success: #238636;
            --error: #da3633;
            --warning: #d29922;
            --border: #30363d;
            --code-bg: #010409;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: grid;
            grid-template-columns: 350px 1fr 350px;
            grid-template-rows: auto 1fr;
            gap: 15px;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            background: rgba(0,0,0,0.2);
            padding: 10px 20px;
            margin: -15px -15px 10px -15px;
        }

        h1 { color: var(--accent); margin: 0; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .card-header {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.02);
        }

        .card-header h2 { font-size: 0.8rem; margin: 0; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

        .card-body {
            padding: 12px;
            flex: 1;
            overflow-y: auto;
        }

        /* Console and Logs */
        .log-entry {
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 4px;
            background: rgba(0,0,0,0.2);
            border-left: 3px solid #333;
            font-size: 0.85rem;
        }

        .log-thought { border-color: #bc8cff; background: rgba(188, 140, 255, 0.05); }
        .log-action { border-color: #ffa657; background: rgba(255, 166, 87, 0.05); }
        .log-error { border-color: var(--error); background: rgba(218, 54, 51, 0.05); }
        .log-success { border-color: var(--success); background: rgba(35, 134, 54, 0.05); }

        .log-meta { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 0.7rem; color: var(--muted); }
        .log-category { font-weight: bold; text-transform: uppercase; }
        
        details {
            margin-top: 6px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--code-bg);
        }

        summary {
            padding: 4px 8px;
            cursor: pointer;
            font-size: 0.75rem;
            color: var(--accent);
            outline: none;
        }

        pre {
            margin: 0;
            padding: 8px;
            overflow-x: auto;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 0.75rem;
            line-height: 1.4;
        }

        /* JSON Syntax Highlighting */
        .json-key { color: #79c0ff; }
        .json-string { color: #a5d6ff; }
        .json-number { color: #ff7b72; }
        .json-boolean { color: #ffa657; }

        /* CLI Block */
        .cli-block {
            background: #000;
            border-radius: 4px;
            padding: 8px;
            height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.75rem;
            border: 1px solid var(--border);
            margin-bottom: 10px;
        }

        /* Analytics Tab */
        .tabs { display: flex; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.1); }
        .tab { padding: 6px 12px; cursor: pointer; font-size: 0.75rem; color: var(--muted); border-bottom: 2px solid transparent; }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(88, 166, 255, 0.05); }

        /* Controls */
        .controls { display: flex; gap: 8px; margin-top: 10px; }
        button {
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.2s;
        }
        button:hover { background: #30363d; border-color: #8b949e; }
        button.primary { background: var(--success); color: white; border: none; }
        button.danger { background: var(--error); color: white; border: none; }

        .status-pill { padding: 2px 8px; border-radius: 10px; font-size: 0.65rem; font-weight: bold; text-transform: uppercase; }
        .status-active { background: rgba(35, 134, 54, 0.2); color: var(--success); }
        .status-idle { background: rgba(139, 148, 158, 0.2); color: var(--muted); }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }

        .analytics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .stat-box { background: rgba(255,255,255,0.03); padding: 8px; border-radius: 4px; text-align: center; }
        .stat-val { font-size: 1.1rem; font-weight: bold; color: var(--accent); }
        .stat-lbl { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; }
    </style>
</head>
<body>
    <header>
        <h1>🌈 ETHUB CLI <span style="font-weight: 200; font-size: 0.8rem; opacity: 0.7;">CONTROL CENTER</span></h1>
        <div style="display: flex; gap: 15px; align-items: center;">
            <div id="connection-status" class="status-pill status-active">Connected</div>
            <div id="sync-time" style="font-size: 0.7rem; color: var(--muted);"></div>
        </div>
    </header>

    <div class="sidebar">
        <div class="card" style="height: 40%;">
            <div class="card-header"><h2>⚙️ System Control</h2></div>
            <div class="card-body">
                <div id="sys-status-ui">
                    <div style="font-size: 0.8rem; margin-bottom: 10px;">Web Server: <span style="color:var(--success)">Running</span></div>
                    <div class="controls">
                        <button class="primary" onclick="window.location.reload()">Refresh UI</button>
                        <button class="danger" onclick="alert('Stop command must be issued from CLI for security.')">Emergency Stop</button>
                    </div>
                </div>
                <div style="margin-top: 15px; border-top: 1px solid var(--border); padding-top: 10px;">
                    <div class="stat-lbl">Active Model</div>
                    <div id="active-model" style="font-size: 0.85rem; font-weight: bold; color: var(--accent);">Loading...</div>
                </div>
            </div>
        </div>
        <div class="card" style="height: 58.5%; margin-top: 15px;">
            <div class="card-header"><h2>📊 Analytics</h2></div>
            <div class="card-body">
                <div class="analytics-grid">
                    <div class="stat-box"><div class="stat-val" id="stat-thoughts">0</div><div class="stat-lbl">Thoughts</div></div>
                    <div class="stat-box"><div class="stat-val" id="stat-actions">0</div><div class="stat-lbl">Actions</div></div>
                    <div class="stat-box"><div class="stat-val" id="stat-errors">0</div><div class="stat-lbl">Errors</div></div>
                    <div class="stat-box"><div class="stat-val" id="stat-risks">0</div><div class="stat-lbl">Risks</div></div>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h2>🧩 Hyper-Detailed Reasoning Flow</h2>
            <div id="agent-status" class="status-pill status-idle">Idle</div>
        </div>
        <div class="card-body" id="reasoning-flow">
            <div style="text-align: center; margin-top: 100px; color: var(--muted); font-size: 0.8rem;">
                No reasoning stream detected. Start a task in the CLI.
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="card" style="height: 30%;">
            <div class="card-header"><h2>📟 CLI Output</h2></div>
            <div class="card-body">
                <div class="cli-block" id="cli-output"></div>
            </div>
        </div>
        <div class="card" style="height: 68.5%; margin-top: 15px;">
            <div class="tabs">
                <div class="tab active" onclick="setTab('history')">History</div>
                <div class="tab" onclick="setTab('risks')">Risks</div>
                <div class="tab" onclick="setTab('settings')">Settings</div>
            </div>
            <div class="card-body" id="tab-content" style="padding: 0;">
                <div style="padding: 20px; text-align: center; color: var(--muted);">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'history';
        const API = "/api";

        function setTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => {
                t.classList.remove('active');
                if (t.innerText.toLowerCase() === tab) t.classList.add('active');
            });
            refreshTab();
        }

        function syntaxHighlight(json) {
            if (typeof json !== 'string') json = JSON.stringify(json, undefined, 2);
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+-]?\d+)?)/g, function (match) {
                var cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) cls = 'json-key';
                    else cls = 'json-string';
                } else if (/true|false/.test(match)) cls = 'json-boolean';
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }

        async function refreshTab() {
            const res = await fetch(`${API}/${currentTab}`);
            if (res.ok) {
                const data = await res.json();
                const content = document.getElementById('tab-content');
                content.innerHTML = `<pre style="padding: 10px;">${syntaxHighlight(data)}</pre>`;
            }
        }

        async function sync() {
            try {
                const logsRes = await fetch(`${API}/logs`);
                const cliRes = await fetch(`${API}/cli-console`);
                const settingsRes = await fetch(`${API}/settings`);
                const risksRes = await fetch(`${API}/risks`);

                if (logsRes.ok && cliRes.ok && settingsRes.ok && risksRes.ok) {
                    const logs = await logsRes.json();
                    const cli = await cliRes.json();
                    const settings = await settingsRes.json();
                    const risks = await risksRes.json();

                    document.getElementById('sync-time').innerText = `Synced: ${new Date().toLocaleTimeString()}`;
                    document.getElementById('active-model').innerText = settings.model || "Unknown";

                    // Analytics
                    const thoughts = logs.filter(l => l.category === 'thought').length;
                    const actions = logs.filter(l => l.category === 'action').length;
                    const errors = logs.filter(l => l.category === 'error').length;
                    
                    document.getElementById('stat-thoughts').innerText = thoughts;
                    document.getElementById('stat-actions').innerText = actions;
                    document.getElementById('stat-errors').innerText = errors;
                    document.getElementById('stat-risks').innerText = Array.isArray(risks) ? risks.length : 0;

                    // Reasoning Flow
                    const flow = document.getElementById('reasoning-flow');
                    if (logs.length > 0) {
                        flow.innerHTML = logs.slice().reverse().filter(l => ['thought', 'action', 'error', 'success'].includes(l.category)).map(log => `
                            <div class="log-entry log-${log.category}">
                                <div class="log-meta">
                                    <span class="log-category">${log.category}</span>
                                    <span>${log.timestamp}</span>
                                </div>
                                <div class="log-msg">${log.message}</div>
                                ${log.details && Object.keys(log.details).length > 0 ? `
                                    <details>
                                        <summary>🔍 Deep Detail (Inspect JSON)</summary>
                                        <pre>${syntaxHighlight(log.details)}</pre>
                                    </details>
                                ` : ''}
                            </div>
                        `).join('');
                        
                        document.getElementById('agent-status').innerText = "Processing";
                        document.getElementById('agent-status').className = "status-pill status-active";
                    } else {
                        document.getElementById('agent-status').innerText = "Idle";
                        document.getElementById('agent-status').className = "status-pill status-idle";
                    }

                    // CLI Output
                    const cliOut = document.getElementById('cli-output');
                    cliOut.innerHTML = cli.map(c => `
                        <div style="margin-bottom: 4px;">
                            <span style="color: #555;">[${c.timestamp.split(' ')[1]}]</span> 
                            ${c.text.replace(/\x1b\[[0-9;]*m/g, '')}
                        </div>
                    `).join('');
                    cliOut.scrollTop = cliOut.scrollHeight;

                    if (currentTab !== 'history') refreshTab();
                }
            } catch (e) {
                document.getElementById('connection-status').innerText = "Disconnected";
                document.getElementById('connection-status').className = "status-pill status-idle";
            }
        }

        setInterval(sync, 2000);
        sync();
        setTab('history');
    </script>
</body>
</html>
